<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akasa Support - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0f0f14; min-height: 100vh; color: #fff; }
    .header {
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .logo { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .status-badge {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      font-size: 0.8rem;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
    .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
    .main { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 1.5rem;
    }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255, 255, 255, 0.5); margin-bottom: 0.5rem; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-value.pending { color: #f59e0b; }
    .stat-value.replied { color: #10b981; }
    .stat-value.total { color: #667eea; }
    .filters { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .filter-btn {
      padding: 0.6rem 1.2rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .filter-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
    .filter-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-color: transparent; }
    .messages-list { display: flex; flex-direction: column; gap: 1rem; }
    .message-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .message-card:hover { border-color: rgba(255, 255, 255, 0.12); }
    .message-card.pending { border-left: 3px solid #f59e0b; }
    .message-card.replied { border-left: 3px solid #10b981; }
    .message-header {
      padding: 1.25rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .message-meta { display: flex; align-items: center; gap: 1.5rem; }
    .message-player { font-weight: 600; font-size: 1rem; }
    .message-uid {
      font-family: monospace;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    .message-source {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.4);
    }
    .message-source.web { color: #667eea; }
    .message-status { padding: 0.35rem 0.75rem; border-radius: 100px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    .message-status.pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .message-status.replied { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .message-body { padding: 1.25rem 1.5rem; }
    .message-content { color: rgba(255, 255, 255, 0.8); line-height: 1.6; font-size: 0.9rem; margin-bottom: 1rem; }
    .message-contact { font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); margin-bottom: 1rem; }
    .message-reply {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 8px;
      padding: 1rem;
    }
    .message-reply-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #667eea; margin-bottom: 0.5rem; }
    .message-reply-content { color: rgba(255, 255, 255, 0.9); font-size: 0.85rem; line-height: 1.5; }
    .message-footer {
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      display: flex; align-items: center; justify-content: space-between;
    }
    .message-time { font-size: 0.75rem; color: rgba(255, 255, 255, 0.3); }
    .message-actions { display: flex; gap: 0.5rem; }
    .message-actions .btn { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 1rem;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1a1a24;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      width: 100%; max-width: 500px; max-height: 90vh; overflow: auto;
    }
    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 1.1rem; font-weight: 600; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(255, 255, 255, 0.05); border: none;
      color: rgba(255, 255, 255, 0.6); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; transition: all 0.2s;
    }
    .modal-close:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .modal-body { padding: 1.5rem; }
    .modal-original { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
    .modal-original-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(255, 255, 255, 0.4); margin-bottom: 0.5rem; }
    .modal-original-content { font-size: 0.9rem; color: rgba(255, 255, 255, 0.7); line-height: 1.5; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.6); margin-bottom: 0.5rem;
    }
    .form-group textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem;
      color: #fff; font-size: 0.9rem; font-family: inherit;
      resize: vertical; min-height: 120px;
    }
    .form-group textarea:focus { outline: none; border-color: #667eea; }
    .modal-footer { padding: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.06); display: flex; gap: 1rem; justify-content: flex-end; }
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px; padding: 2.5rem;
      width: 100%; max-width: 400px;
    }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; text-align: center; }
    .login-card p { color: rgba(255, 255, 255, 0.5); text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
    .login-card input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1rem;
      color: #fff; font-size: 1rem; font-family: inherit;
      margin-bottom: 1rem; text-align: center;
    }
    .login-card input:focus { outline: none; border-color: #667eea; }
    .login-card .btn { width: 100%; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: rgba(255, 255, 255, 0.4); }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 1rem; opacity: 0.3; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: rgba(255, 255, 255, 0.6); }
    .empty-state p { font-size: 0.9rem; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.1); border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ref-id { font-family: monospace; font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); }
    .hidden { display: none !important; }
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: #1a1a24; border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px; padding: 1rem 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      transform: translateY(100px); opacity: 0;
      transition: all 0.3s; z-index: 1001;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(16, 185, 129, 0.3); }
    .toast-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .toast.success .toast-icon { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    @media (max-width: 768px) {
      .header { padding: 1rem; }
      .main { padding: 1rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .message-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .message-footer { flex-direction: column; gap: 1rem; }
      .message-actions { width: 100%; }
      .message-actions .btn { flex: 1; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div class="logo-icon" style="width: 56px; height: 56px; margin: 0 auto 1rem; font-size: 1.5rem;">🎮</div>
        <h1>Admin Dashboard</h1>
        <p>Enter your access token to continue</p>
      </div>
      <form id="loginForm">
        <input type="password" id="tokenInput" placeholder="Enter access token" required>
        <button type="submit" class="btn btn-primary">Access Dashboard</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <div class="logo-icon">🎮</div>
          <span>Akasa Support</span>
        </div>
      </div>
      <div class="header-right">
        <div class="status-badge"><div class="status-dot"></div><span>Live</span></div>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
      </div>
    </header>

    <main class="main">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-label">Total Messages</div>
          <div class="stat-value total" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending</div>
          <div class="stat-value pending" id="statPending">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Replied</div>
          <div class="stat-value replied" id="statReplied">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Today</div>
          <div class="stat-value total" id="statToday">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">This Week</div>
          <div class="stat-value total" id="statWeek">0</div>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All Messages</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="replied">Replied</button>
        <button class="filter-btn" data-filter="web">Web Only</button>
      </div>

      <div class="messages-list" id="messagesList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <!-- Reply Modal -->
  <div class="modal-overlay" id="replyModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Reply to Message</div>
        <button class="modal-close" onclick="closeReplyModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-original">
          <div class="modal-original-label">Original Message</div>
          <div class="modal-original-content" id="modalOriginal"></div>
        </div>
        <div class="form-group">
          <label for="replyText">Your Reply</label>
          <textarea id="replyText" placeholder="Type your response..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeReplyModal()">Cancel</button>
        <button class="btn btn-primary" onclick="sendReply()">Send Reply</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="toast-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M20 6L9 17L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span id="toastMessage">Success!</span>
  </div>

  <script>
    const API_URL = '/api';
    let token = localStorage.getItem('admin_token') || '';
    let messages = [];
    let currentFilter = 'all';
    let currentReplyId = null;

    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('dashboard');
    const messagesList = document.getElementById('messagesList');
    const loginForm = document.getElementById('loginForm');
    const replyModal = document.getElementById('replyModal');

    function init() {
      if (token) { showDashboard(); loadStats(); loadMessages(); }
      setInterval(() => { if (token && !replyModal.classList.contains('show')) { loadStats(); loadMessages(); } }, 30000);
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      token = document.getElementById('tokenInput').value.trim();
      if (!token) return;
      localStorage.setItem('admin_token', token);
      showDashboard();
      loadStats();
      loadMessages();
    });

    function logout() {
      token = '';
      localStorage.removeItem('admin_token');
      loginScreen.classList.remove('hidden');
      dashboard.classList.add('hidden');
    }

    function showDashboard() {
      loginScreen.classList.add('hidden');
      dashboard.classList.remove('hidden');
    }

    async function loadStats() {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'get_stats', token })
        });
        const data = await response.json();
        if (data.success) {
          document.getElementById('statTotal').textContent = data.stats.total;
          document.getElementById('statPending').textContent = data.stats.pending;
          document.getElementById('statReplied').textContent = data.stats.replied;
          document.getElementById('statToday').textContent = data.stats.today;
          document.getElementById('statWeek').textContent = data.stats.week;
        }
      } catch (error) { console.error('Failed to load stats'); }
    }

    async function loadMessages() {
      messagesList.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'get_messages', token })
        });
        const data = await response.json();
        if (data.success) { messages = data.messages; renderMessages(); }
        else { messagesList.innerHTML = '<div class="empty-state"><h3>Unable to load messages</h3></div>'; }
      } catch (error) { messagesList.innerHTML = '<div class="empty-state"><h3>Connection error</h3></div>'; }
    }

    function renderMessages() {
      let filtered = messages;
      if (currentFilter === 'pending') filtered = messages.filter(m => m.status === 'pending');
      else if (currentFilter === 'replied') filtered = messages.filter(m => m.status === 'replied');
      else if (currentFilter === 'web') filtered = messages.filter(m => m.sender_type === 'web');

      if (filtered.length === 0) {
        messagesList.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><h3>No messages found</h3><p>Messages will appear here when players submit them</p></div>';
        return;
      }

      messagesList.innerHTML = filtered.map(msg => `
        <div class="message-card ${msg.status}">
          <div class="message-header">
            <div class="message-meta">
              <span class="message-player">${escapeHtml(msg.player_name)}</span>
              <span class="message-uid">UID: ${escapeHtml(msg.uid)}</span>
              <span class="message-source ${msg.sender_type}">${msg.sender_type === 'web' ? '🌐 Web' : '📱 Telegram'}</span>
            </div>
            <span class="message-status ${msg.status}">${msg.status}</span>
          </div>
          <div class="message-body">
            <div class="message-content">${escapeHtml(msg.message)}</div>
            ${msg.contact_method ? `<div class="message-contact">📞 Contact: ${escapeHtml(msg.contact_method)}</div>` : ''}
            ${msg.reply ? `<div class="message-reply"><div class="message-reply-label">Reply</div><div class="message-reply-content">${escapeHtml(msg.reply)}</div></div>` : ''}
          </div>
          <div class="message-footer">
            <div class="message-time">${formatDate(msg.created_at)} • Ref: <span class="ref-id">#${msg.id}</span></div>
            <div class="message-actions">
              ${msg.status === 'pending' ? `<button class="btn btn-primary" onclick="openReplyModal('${msg.id}', '${escapeHtml(msg.message)}')">Reply</button>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderMessages();
      });
    });

    function openReplyModal(id, originalMessage) {
      currentReplyId = id;
      document.getElementById('modalOriginal').textContent = originalMessage;
      document.getElementById('replyText').value = '';
      replyModal.classList.add('show');
    }

    function closeReplyModal() { replyModal.classList.remove('show'); currentReplyId = null; }

    async function sendReply() {
      if (!currentReplyId) return;
      const reply = document.getElementById('replyText').value.trim();
      if (!reply) { showToast('Please enter a reply'); return; }
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'reply', token, msg_id: currentReplyId, reply })
        });
        const data = await response.json();
        if (data.success) { closeReplyModal(); showToast('Reply sent!'); loadStats(); loadMessages(); }
        else { showToast(data.error || 'Failed to send'); }
      } catch (error) { showToast('Connection error'); }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = message;
      toast.classList.add('show', 'success');
      setTimeout(() => { toast.classList.remove('show', 'success'); }, 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    init();
  </script>
</body>
</html>
