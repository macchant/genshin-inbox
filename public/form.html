<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - Send a Message</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --bg-soft: #232342;
      --card: #2a2a4a;
      --accent: #5fb9b0;
      --accent-light: #7dd3cb;
      --gold: #e8c87a;
      --pink: #e8a0bf;
      --purple: #a78bfa;
      --text: #f0f0f5;
      --text-soft: #a0a0b5;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 30%, rgba(95, 185, 176, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 70%, rgba(167, 139, 250, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .deco {
      position: fixed;
      pointer-events: none;
      opacity: 0.15;
      font-size: 2rem;
    }
    .deco-1 { top: 10%; left: 5%; animation: float 5s infinite; }
    .deco-2 { bottom: 15%; right: 8%; animation: float 6s infinite 1s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(95, 185, 176, 0.3);
    }

    .logo h1 {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .logo p {
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 0.4rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      font-size: 0.9rem;
      color: var(--text);
      font-family: inherit;
      transition: all 0.3s;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-soft);
      opacity: 0.6;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(95, 185, 176, 0.15);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .char-count {
      text-align: right;
      font-size: 0.7rem;
      color: var(--text-soft);
      margin-top: 0.3rem;
      opacity: 0.6;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border: none;
      border-radius: 50px;
      color: var(--bg);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(95, 185, 176, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .tips {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(95, 185, 176, 0.08);
      border: 1px solid rgba(95, 185, 176, 0.15);
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .tips strong { color: var(--accent); }

    .tips a {
      color: var(--accent);
      text-decoration: none;
    }

    .back {
      text-align: center;
      margin-top: 1rem;
    }

    .back a {
      color: var(--text-soft);
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back a:hover { color: var(--accent); }

    /* Success */
    .success { display: none; text-align: center; padding: 1rem 0; }
    .success.show { display: block; }

    .success-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
      animation: pop 0.5s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .success h2 {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .success p {
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .form-content { display: block; }
    .form-content.hidden { display: none; }

    .error {
      background: rgba(255, 107, 107, 0.15);
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: #ff9f9f;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error.show { display: block; }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="deco deco-1">✨</div>
  <div class="deco deco-2">💫</div>

  <div class="card">
    <div class="form-content" id="formContent">
      <div class="logo">
        <div class="logo-icon">💬</div>
        <h1>Hey, Sry I'm Offline~</h1>
        <p>If there's something I can help, drop your message below ✨</p>
      </div>

      <div class="error" id="errorMsg"></div>

      <form id="supportForm">
        <div class="form-row">
          <div class="form-group">
            <label for="playerName">In-Game Name</label>
            <input type="text" id="playerName" placeholder="YourName" required maxlength="30">
          </div>
          <div class="form-group">
            <label for="uid">UID</label>
            <input type="text" id="uid" placeholder="123456" required pattern="[0-9]+" minlength="4" maxlength="20">
          </div>
        </div>

        <div class="form-group">
          <label for="message">What's up?</label>
          <textarea id="message" placeholder="Tell us what's going on..." required maxlength="500"></textarea>
          <div class="char-count"><span id="charCount">0</span>/500</div>
        </div>

        <div class="form-group">
          <label for="contactMethod">Contact (optional)</label>
          <input type="text" id="contactMethod" placeholder="Discord or email">
        </div>

        <button type="submit" class="btn" id="submitBtn">
          ✨ Send Message
        </button>
      </form>

      <div class="tips">
        <strong>💡 Tips:</strong> Make sure your UID is correct! Screenshots help a lot too!<br><br>
        <a href="inbox.html">📬 Check your messages →</a>
      </div>

      <div class="back">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>

    <div class="success" id="successMsg">
      <div class="success-icon">✨</div>
      <h2>Got it!</h2>
      <p>We'll get back to you soon~ 💜</p>
      <div class="back" style="margin-top: 1.5rem;">
        <a href="inbox.html">📬 Check your messages →</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('supportForm');
    const formContent = document.getElementById('formContent');
    const successMsg = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const messageInput = document.getElementById('message');
    const charCount = document.getElementById('charCount');

    messageInput.addEventListener('input', () => {
      charCount.textContent = messageInput.value.length;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const playerName = document.getElementById('playerName').value.trim();
      const uid = document.getElementById('uid').value.trim();
      const message = document.getElementById('message').value.trim();
      const contactMethod = document.getElementById('contactMethod').value.trim();

      if (!playerName || !uid || !message) {
        errorMsg.textContent = 'Please fill in all required fields';
        errorMsg.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      errorMsg.classList.remove('show');

      try {
        const response = await fetch('/api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'submit', playerName, uid, message, contactMethod })
        });
        const data = await response.json();

        if (data.success) {
          formContent.classList.add('hidden');
          successMsg.classList.add('show');
        } else {
          errorMsg.textContent = data.error || 'Something went wrong';
          errorMsg.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = '✨ Send Message';
        }
      } catch (error) {
        console.error('Form submit error:', error);
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = '✨ Send Message';
      }
    });
  </script>
</body>
</html>
