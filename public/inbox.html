<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - Check Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --bg-soft: #232342;
      --card: #2a2a4a;
      --accent: #5fb9b0;
      --accent-light: #7dd3cb;
      --gold: #e8c87a;
      --pink: #e8a0bf;
      --purple: #a78bfa;
      --text: #f0f0f5;
      --text-soft: #a0a0b5;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 30%, rgba(95, 185, 176, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 70%, rgba(232, 160, 191, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .deco {
      position: fixed;
      pointer-events: none;
      opacity: 0.12;
      font-size: 2rem;
    }
    .deco-1 { top: 10%; left: 5%; animation: float 6s infinite; }
    .deco-2 { bottom: 15%; right: 8%; animation: float 5s infinite 1s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 20px rgba(95, 185, 176, 0.25);
    }

    .logo h1 {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .logo p {
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 0.4rem;
    }

    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0.9rem 1rem;
      font-size: 0.95rem;
      color: var(--text);
      font-family: inherit;
      text-align: center;
      transition: all 0.3s;
    }

    .form-group input::placeholder {
      color: var(--text-soft);
      opacity: 0.5;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(95, 185, 176, 0.15);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border: none;
      border-radius: 50px;
      color: var(--bg);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(95, 185, 176, 0.35);
    }

    .back {
      text-align: center;
      margin-top: 1rem;
    }

    .back a {
      color: var(--text-soft);
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back a:hover { color: var(--accent); }

    /* Results */
    .results { display: none; }
    .results.show { display: block; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 1rem;
    }

    .results-title {
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
    }

    .results-uid {
      font-size: 0.75rem;
      color: var(--text-soft);
      background: rgba(255,255,255,0.05);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
    }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-height: 400px;
      overflow-y: auto;
    }

    .message {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      overflow: hidden;
    }

    .message.pending { border-left: 3px solid var(--gold); }
    .message.replied { border-left: 3px solid var(--accent); }

    .message-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.02);
    }

    .message-date {
      font-size: 0.7rem;
      color: var(--text-soft);
    }

    .message-status {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .message.pending .message-status {
      background: rgba(232, 200, 122, 0.2);
      color: var(--gold);
    }

    .message.replied .message-status {
      background: rgba(95, 185, 176, 0.2);
      color: var(--accent);
    }

    .message-body {
      padding: 0.8rem 1rem;
    }

    .message-content {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 0.8rem;
    }

    .message-reply {
      background: rgba(95, 185, 176, 0.1);
      border: 1px solid rgba(95, 185, 176, 0.15);
      border-radius: 8px;
      padding: 0.8rem;
    }

    .message-reply-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .message-reply-content {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.5;
    }

    /* Empty/Loading */
    .empty, .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-soft);
    }

    .empty-icon, .loading-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty h3, .loading h3 {
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .empty p, .loading p {
      font-size: 0.8rem;
    }

    .loading-icon {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(95, 185, 176, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 1rem;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .form-section { display: block; }
    .form-section.hidden { display: none; }

    .error {
      background: rgba(255, 107, 107, 0.15);
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: #ff9f9f;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="deco deco-1">📬</div>
  <div class="deco deco-2">✨</div>

  <div class="card">
    <!-- Form -->
    <div class="form-section" id="checkForm">
      <div class="logo">
        <div class="logo-icon">📬</div>
        <h1>Check Messages</h1>
        <p>Enter your UID to see your messages</p>
      </div>

      <div class="error" id="errorMsg"></div>

      <form id="inboxForm">
        <div class="form-group">
          <label for="uid">Your UID</label>
          <input type="text" id="uid" placeholder="Enter your UID">
        </div>
        <button type="submit" class="btn">✨ Check Messages</button>
      </form>

      <div class="back">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading" style="display: none;">
      <div class="loading-icon"></div>
      <h3>Loading...</h3>
      <p>Just a moment ✨</p>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <div class="results-header">
        <span class="results-title">✨ Your Messages</span>
        <span class="results-uid" id="resultsUid">UID: 123456</span>
      </div>
      <div class="message-list" id="messageList"></div>
      <div class="back" style="margin-top: 1rem;">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('inboxForm');
    const checkForm = document.getElementById('checkForm');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const messageList = document.getElementById('messageList');
    const resultsUid = document.getElementById('resultsUid');
    const errorMsg = document.getElementById('errorMsg');

    // Check URL for UID
    const urlParams = new URLSearchParams(window.location.search);
    const uidFromUrl = urlParams.get('uid');
    if (uidFromUrl) {
      document.getElementById('uid').value = uidFromUrl;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const uid = document.getElementById('uid').value.trim();

      if (!uid || uid.length < 4) {
        errorMsg.textContent = 'Please enter a valid UID';
        errorMsg.classList.add('show');
        return;
      }

      checkForm.classList.add('hidden');
      loading.style.display = 'block';
      errorMsg.classList.remove('show');

      try {
        const response = await fetch('/api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'get_messages_by_uid', uid })
        });
        const data = await response.json();
        loading.style.display = 'none';

        if (data.success) {
          showResults(uid, data.messages);
        } else {
          errorMsg.textContent = 'Something went wrong';
          errorMsg.classList.add('show');
          checkForm.classList.remove('hidden');
        }
      } catch (error) {
        loading.style.display = 'none';
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.classList.add('show');
        checkForm.classList.remove('hidden');
      }
    });

    function showResults(uid, messages) {
      resultsUid.textContent = 'UID: ' + uid;
      messageList.innerHTML = '';

      if (messages.length === 0) {
        messageList.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📭</div>
            <h3>No messages yet</h3>
            <p>Haven't sent anything? <a href="form.html" style="color: var(--accent);">Send one!</a></p>
          </div>
        `;
      } else {
        messages.forEach(msg => {
          const div = document.createElement('div');
          div.className = 'message ' + msg.status;
          div.innerHTML = `
            <div class="message-header">
              <span class="message-date">${formatDate(msg.created_at)}</span>
              <span class="message-status">${msg.status === 'pending' ? 'Waiting' : 'Replied'}</span>
            </div>
            <div class="message-body">
              <div class="message-content">${escapeHtml(msg.message)}</div>
              ${msg.reply ? `
                <div class="message-reply">
                  <div class="message-reply-label">💜 Aquilonia's Reply</div>
                  <div class="message-reply-content">${escapeHtml(msg.reply)}</div>
                </div>
              ` : ''}
            </div>
          `;
          messageList.appendChild(div);
        });
      }

      results.classList.add('show');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }
  </script>
</body>
</html>
