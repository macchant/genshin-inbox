<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akasa - Check Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #fff;
    }
    .bg-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .container { width: 100%; max-width: 600px; position: relative; z-index: 1; }
    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 2.5rem;
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .logo h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .logo p { color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.5rem;
    }
    .form-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      font-size: 1rem;
      color: #fff;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: rgba(255, 255, 255, 0.3); }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }
    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .back-link { text-align: center; margin-top: 1.5rem; }
    .back-link a { color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; text-decoration: none; transition: color 0.2s; }
    .back-link a:hover { color: rgba(255, 255, 255, 0.8); }
    .results { display: none; }
    .results.show { display: block; }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .results-title { font-size: 1rem; font-weight: 600; }
    .results-uid {
      font-family: monospace;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    .message-list { display: flex; flex-direction: column; gap: 1rem; }
    .message-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      overflow: hidden;
    }
    .message-item.pending { border-left: 3px solid #f59e0b; }
    .message-item.replied { border-left: 3px solid #10b981; }
    .message-header {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .message-date { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); }
    .message-status {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    .message-status.pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .message-status.replied { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .message-body { padding: 1rem; }
    .message-content { font-size: 0.9rem; color: rgba(255, 255, 255, 0.8); line-height: 1.6; margin-bottom: 1rem; }
    .message-reply {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      padding: 1rem;
    }
    .message-reply-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: #10b981; margin-bottom: 0.5rem; font-weight: 600; }
    .message-reply-content { font-size: 0.85rem; color: rgba(255, 255, 255, 0.9); line-height: 1.5; }
    .no-messages { text-align: center; padding: 2rem; color: rgba(255, 255, 255, 0.4); }
    .no-messages svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.3; }
    .no-messages h3 { font-size: 1rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 0.5rem; }
    .no-messages p { font-size: 0.85rem; }
    .loading { text-align: center; padding: 2rem; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .form-section { display: block; }
    .form-section.hidden { display: none; }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <div class="card">
      <div class="form-section" id="checkForm">
        <div class="logo">
          <div class="logo-icon">📬</div>
          <h1>Check Your Messages</h1>
          <p>Enter your UID to see your support requests</p>
        </div>
        <div class="error" id="errorMsg"></div>
        <form id="inboxForm">
          <div class="form-group">
            <label for="uid">Your UID</label>
            <input type="text" id="uid" name="uid" placeholder="Enter your game UID" required>
          </div>
          <button type="submit" class="btn" id="submitBtn">Check Messages</button>
        </form>
        <div class="back-link">
          <a href="index.html">← Back to Support Home</a>
        </div>
      </div>

      <div class="loading" id="loading" style="display: none;">
        <div class="spinner"></div>
        <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">Checking messages...</p>
      </div>

      <div class="results" id="results">
        <div class="results-header">
          <span class="results-title">Your Messages</span>
          <span class="results-uid" id="resultsUid">UID: 12345</span>
        </div>
        <div class="message-list" id="messageList"></div>
        <div class="back-link">
          <a href="index.html">← Back to Support Home</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('inboxForm');
    const checkForm = document.getElementById('checkForm');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const messageList = document.getElementById('messageList');
    const resultsUid = document.getElementById('resultsUid');
    const errorMsg = document.getElementById('errorMsg');

    const urlParams = new URLSearchParams(window.location.search);
    const uidFromUrl = urlParams.get('uid');
    if (uidFromUrl) {
      document.getElementById('uid').value = uidFromUrl;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const uid = document.getElementById('uid').value.trim();

      if (!uid || uid.length < 4) {
        showError('Please enter a valid UID (at least 4 characters)');
        return;
      }

      checkForm.classList.add('hidden');
      loading.style.display = 'block';
      hideError();

      try {
        const response = await fetch('/api', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'get_messages_by_uid', uid })
        });

        const data = await response.json();
        loading.style.display = 'none';

        if (data.success) {
          showResults(uid, data.messages);
        } else {
          showError(data.error || 'Failed to load messages');
          checkForm.classList.remove('hidden');
        }
      } catch (error) {
        loading.style.display = 'none';
        showError('Connection error. Please try again.');
        checkForm.classList.remove('hidden');
      }
    });

    function showResults(uid, messages) {
      resultsUid.textContent = 'UID: ' + uid;
      messageList.innerHTML = '';

      if (messages.length === 0) {
        messageList.innerHTML = `
          <div class="no-messages">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h3>No messages found</h3>
            <p>You haven't submitted any support requests yet.</p>
            <p style="margin-top: 0.5rem;"><a href="form.html" style="color: #667eea;">Submit a request →</a></p>
          </div>
        `;
      } else {
        messages.forEach(msg => {
          const div = document.createElement('div');
          div.className = 'message-item ' + msg.status;
          div.innerHTML = `
            <div class="message-header">
              <span class="message-date">${formatDate(msg.created_at)}</span>
              <span class="message-status ${msg.status}">${msg.status === 'pending' ? 'Pending' : 'Replied'}</span>
            </div>
            <div class="message-body">
              <div class="message-content">${escapeHtml(msg.message)}</div>
              ${msg.reply ? `
                <div class="message-reply">
                  <div class="message-reply-label">Response from Support Team</div>
                  <div class="message-reply-content">${escapeHtml(msg.reply)}</div>
                </div>
              ` : ''}
            </div>
          `;
          messageList.appendChild(div);
        });
      }

      results.classList.add('show');
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    function hideError() {
      errorMsg.classList.remove('show');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }
  </script>
</body>
</html>
